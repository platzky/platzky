name: Gitleaks

on:
  pull_request:
    branches:
      - main

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to post annotations on PRs
      pull-requests: read

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # We use the gitleaks CLI directly instead of the gitleaks-action wrapper.
      # The action requires a GITLEAKS_LICENSE secret, which would force us to use
      # pull_request_target to expose secrets to fork PRs — a security risk, as it
      # would allow untrusted fork code to access repository secrets.
      - name: Run Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.26.0/gitleaks_8.26.0_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . --log-level info
