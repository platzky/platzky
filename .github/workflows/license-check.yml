name: License Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  license-check:
    name: Dependency License Review
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low
          # MIT licensed. Allow permissive licenses only.
          allow-licenses: >-
            Apache-2.0,
            MIT,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            CC0-1.0,
            Unlicense,
            EPL-1.0,
            EPL-2.0,
            CDDL-1.0,
            PSF-2.0
