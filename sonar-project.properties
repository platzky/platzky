# Suppress the "missing lock file" rule for example plugin packages.
# These are dev-only path dependencies pinned by the main project's poetry.lock,
# so maintaining a separate lock file per plugin would be redundant churn.
sonar.issue.ignore.multicriteria=example-plugin-lock-files
sonar.issue.ignore.multicriteria.example-plugin-lock-files.ruleKey=*
sonar.issue.ignore.multicriteria.example-plugin-lock-files.resourceKey=examples/**/pyproject.toml
